name: Frontend DevSecOps Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write
  security-events: write
  actions: read

jobs:
  # ─── TEST: Playwright E2E ───────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
    env:
      TEST_BASE_URL: ${{ secrets.TEST_BASE_URL || 'http://localhost:3000' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: frontend

      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: 2110503-CEDT68/se-project-be-68-2-orangered
          path: backend
          ref: fix/CI


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend dependencies
        run: cd frontend && npm ci

      - name: Install Backend dependencies
        run: cd backend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Build Frontend
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:5000
          BACKEND_URL: http://localhost:5000
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'testsecret' }}
          NEXTAUTH_URL: http://localhost:3000

      - name: Start Backend
        run: |
          cd backend
          # Run seeder with env vars to ensure IDs match
          export MONGO_URI=mongodb://localhost:27017/test
          export TEST_CUSTOMER_EMAIL="${{ secrets.TEST_CUSTOMER_EMAIL || 'johannnnnnnn@ex.com' }}"
          export TEST_CUSTOMER_PASSWORD="${{ secrets.TEST_CUSTOMER_PASSWORD || 'mypassword' }}"
          export TEST_SHOP_OWNER_EMAIL="${{ secrets.TEST_SHOP_OWNER_EMAIL || 'muhaha@gmail.com' }}"
          export TEST_SHOP_OWNER_PASSWORD="${{ secrets.TEST_SHOP_OWNER_PASSWORD || '123456' }}"
          export TEST_SHOP_ID="${{ secrets.TEST_SHOP_ID || '69e09583325ac59ae03654c6' }}"
          export TEST_RATING_SHOP_ID="${{ secrets.TEST_RATING_SHOP_ID || '69c18e195177b2a42c8cf139' }}"
          export TEST_DEACTIVATE_EMAIL="${{ secrets.TEST_DEACTIVATE_EMAIL || 'client_1777004995801@test.com' }}"
          export TEST_DEACTIVATE_PASSWORD="${{ secrets.TEST_DEACTIVATE_PASSWORD || 'password123' }}"
          
          node seed-ci.js
          
          # Start server
          export PORT=5000
          export MONGO_URI=mongodb://localhost:27017/test
          export JWT_SECRET=testsecret
          export JWT_EXPIRE=30d
          export JWT_COOKIE_EXPIRE=30
          export NODE_ENV=development
          node server.js > be.log 2>&1 &
          
          # Wait for backend to be healthy
          for i in {1..30}; do
            if curl -s http://localhost:5000/api/v1/shops > /dev/null; then
              echo "Backend is UP"
              break
            fi
            echo "Waiting for backend ($i/30)..."
            sleep 2
          done

      - name: Start Frontend
        run: |
          cd frontend
          NEXT_PUBLIC_BACKEND_URL=http://localhost:5000 BACKEND_URL=http://localhost:5000 NEXTAUTH_SECRET=testsecret NEXTAUTH_URL=http://localhost:3000 npm run start > fe.log 2>&1 &
          
          # Wait for frontend to be healthy
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Frontend is UP"
              break
            fi
            echo "Waiting for frontend ($i/30)..."
            sleep 2
          done

      - name: Run E2E tests
        run: |
          cd frontend
          npm run test:e2e
        env:
          TEST_BASE_URL: http://localhost:3000
          TEST_CUSTOMER_EMAIL: ${{ secrets.TEST_CUSTOMER_EMAIL || 'johannnnnnnn@ex.com' }}
          TEST_CUSTOMER_PASSWORD: ${{ secrets.TEST_CUSTOMER_PASSWORD || 'mypassword' }}
          TEST_SHOP_OWNER_EMAIL: ${{ secrets.TEST_SHOP_OWNER_EMAIL || 'muhaha@gmail.com' }}
          TEST_SHOP_OWNER_PASSWORD: ${{ secrets.TEST_SHOP_OWNER_PASSWORD || '123456' }}
          TEST_SHOP_ID: ${{ secrets.TEST_SHOP_ID || '69c18e195177b2a42c8cf139' }}
          TEST_RATING_SHOP_ID: ${{ secrets.TEST_RATING_SHOP_ID || '69c18e195177b2a42c8cf139' }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL || 'adminkeith@example.com' }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD || 'mypassword' }}
          TEST_DEACTIVATE_EMAIL: ${{ secrets.TEST_DEACTIVATE_EMAIL || 'client_1777004995801@test.com' }}
          TEST_DEACTIVATE_PASSWORD: ${{ secrets.TEST_DEACTIVATE_PASSWORD || 'password123' }}

      - name: Print Logs on Failure
        if: failure()
        run: |
          echo "--- BACKEND LOGS ---"
          cat backend/be.log || true
          echo "--- FRONTEND LOGS ---"
          cat frontend/fe.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ─── GATE#0: Secret scanning (TruffleHog + Gitleaks) ──────────────────────
  secret-scanning:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: ${{ github.sha }}
          extra_args: --only-verified

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  # ─── GATE#1a: SAST via SonarQube ──────────────────────────────────────────
  sast-scan:
    runs-on: ubuntu-latest
    needs: [test, secret-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ─── GATE#1b: SAST via CodeQL ─────────────────────────────────────────────
  codeql-scan:
    runs-on: ubuntu-latest
    needs: secret-scanning
    if: ${{ !cancelled() }}
    strategy:
      matrix:
        language: ['javascript']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ─── GATE#2: Dependency scanning via OWASP Dependency-Check ──────────────
  dependency-scanning:
    runs-on: ubuntu-latest
    needs: [sast-scan, secret-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Depcheck
        uses: dependency-check/Dependency-Check_Action@main
        continue-on-error: true
        id: Depcheck
        with:
          project: 'OrangeRed-Frontend'
          path: '.'
          format: 'SARIF'
          out: 'reports'
          args: >
            --failOnCVSS 7
            --enableRetired

      - name: Upload Depcheck SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check

      - name: Upload Depcheck HTML report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: depcheck-report
          path: reports/

  # ─── GATE#3: Container scanning via Trivy ─────────────────────────────────
  image-scanning:
    runs-on: ubuntu-latest
    needs: [dependency-scanning]
    if: ${{ !cancelled() }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-app:latest .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: 'my-app:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
